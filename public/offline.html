<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — LiveSupport</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0f; color: #f0f0f4; font-family: 'Sora', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .icon { width: 56px; height: 56px; border-radius: 14px; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: #9898a8; line-height: 1.6; max-width: 320px; margin: 0 auto 24px; }
    button { padding: 10px 24px; border-radius: 8px; background: #f59e0b; color: black; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div>
    <div class="icon">⚡</div>
    <h1>You're offline</h1>
    <p>LiveSupport needs a connection to show conversations. Please check your internet and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
